name: Homologacao

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # 📦 PRECAUÇÃO MÁXIMA: Garante a instalação limpa e reconstrói todos os binários (incluindo o Cypress)
      - name: Instalar Dependências do Sistema
        run: npm install

      # 🧹 1. ETAPA: ESLint (Garante a qualidade do código antes do build)
      - name: Verificar Código (ESLint)
        run: npm run lint

      # 🏗️ 2. ETAPA: Build (Gera a versão de produção do Vite)
      - name: Build do Projeto
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      # 🧪 3. ETAPA: Cypress (Executa a suíte de testes E2E)
      - name: Testes E2E (Cypress)
        uses: cypress-io/github-action@v6
        with:
          browser: chrome
          # 🔥 SEGURANÇA: Avisa a Action que as dependências já foram instaladas e checadas no passo anterior
          install: false
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}