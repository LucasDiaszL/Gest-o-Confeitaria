name: Homologacao

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Instalar dependencias
        run: npm install

      # 🧹 1. ETAPA NOVA: ESLint (Impede que código com erros de sintaxe avance)
      - name: Verificar Código (ESLint)
        run: npm run lint

      # 🏗️ 2. ETAPA ORIGINAL: Build (Gera a versão final do teu sistema)
      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      # 🧪 3. ETAPA NOVA: Cypress (Roda os testes simulando o utilizador)
      - name: Testes E2E (Cypress)
        uses: cypress-io/github-action@v6
        with:
          browser: chrome
        # O Cypress pode precisar das tuas variáveis de ambiente para aceder ao banco
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}