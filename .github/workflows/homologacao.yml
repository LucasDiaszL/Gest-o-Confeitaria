name: Homologacao

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # 📦 PRECAUÇÃO MÁXIMA: Garante a instalação limpa do projeto
      - name: Instalar Dependências do Sistema
        run: npm install

      # 🧹 1. ETAPA: ESLint (Garante a qualidade do código antes do build)
      - name: Verificar Código (ESLint)
        run: npm run lint

      # 🏗️ 2. ETAPA: Build (Gera a versão de produção do Vite)
      - name: Build do Projeto
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      # 🧪 3. ETAPA: Cypress (Executa os testes usando o binário local do node_modules)
      - name: Testes E2E (Cypress)
        uses: cypress-io/github-action@v6
        with:
          browser: chrome
          # 🔥 SOLUÇÃO: Como instalaste manualmente, dizemos à Action para usar o npx local
          command: npx cypress run --browser chrome
          install: false
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}